<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Copilot </title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:#1a1a2e;color:#e8e8f0;height:100vh;display:flex;flex-direction:column}
        .header{background:linear-gradient(135deg,#667eea,#764ba2);padding:16px 24px;text-align:center}
        .header h2{font-size:1.3em}
        .chat-container{flex:1;max-width:900px;margin:0 auto;width:100%;display:flex;flex-direction:column;padding:20px;overflow:hidden}
        .messages{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:12px}
        .message{max-width:80%;padding:14px 18px;border-radius:16px;line-height:1.5;animation:fadeIn .3s}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .user-message{background:#0f3460;align-self:flex-end;border-bottom-right-radius:4px}
        .ai-message{background:#1a1a40;align-self:flex-start;border-bottom-left-radius:4px;border-left:3px solid #667eea}
        .sources{margin-top:10px;padding-top:8px;border-top:1px solid #333;font-size:.75em;color:#888}
        .input-area{display:flex;gap:10px;padding:16px 0}
        .input-area input{flex:1;padding:14px 18px;border-radius:25px;border:2px solid #333;background:#16213e;color:#fff;font-size:15px;outline:none;transition:.3s}
        .input-area input:focus{border-color:#667eea}
        .input-area button{padding:14px 28px;border-radius:25px;border:none;background:#667eea;color:#fff;font-weight:700;cursor:pointer;font-size:15px;transition:.3s}
        .input-area button:hover{background:#764ba2}
        .input-area button:disabled{opacity:.5;cursor:not-allowed}
        .typing{display:flex;gap:4px;padding:10px}
        .typing span{width:8px;height:8px;background:#667eea;border-radius:50%;animation:bounce 1.4s infinite}
        .typing span:nth-child(2){animation-delay:.2s}
        .typing span:nth-child(3){animation-delay:.4s}
        @keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
    </style>
</head>
<body>
    <div class="header">
        <h2>🤖 AI Copilot </h2>
        <p style="font-size:.85em;opacity:.8">Ask questions about your motor documents</p>
    </div>
    <div class="chat-container">
        <div class="messages" id="messages">
            <div class="message ai-message">👋 Hello! I'm your AI Copilot. Ask me anything about your documents - maintenance, inspection, specifications, or troubleshooting.</div>
        </div>
        <div class="input-area">
            <input type="text" id="q" placeholder="How to maintain the motor bearings?" onkeypress="if(event.key==='Enter')send()">
            <button onclick="send()" id="btn">📤 Send</button>
        </div>
    </div>
    <script>
        var API = 'http://localhost:8000';
        
        async function send() {
            var question = document.getElementById('q').value.trim();
            if (!question) return;
            
            addMessage(question, 'user');
            document.getElementById('q').value = '';
            
            var typingId = showTyping();
            document.getElementById('btn').disabled = true;
            
            try {
                var response = await fetch(API + '/copilot/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: question, top_k: 3 })
                });
                var data = await response.json();
                removeTyping(typingId);
                
                var answer = data.answer || 'Sorry, I could not find an answer.';
                var sourcesHtml = '';
                if (data.sources && data.sources.length) {
                    sourcesHtml = '<div class="sources">📚 Sources: ' + data.sources.join(', ') + '</div>';
                }
                addMessage(answer + sourcesHtml, 'ai');
            } catch (e) {
                removeTyping(typingId);
                addMessage('❌ Error: ' + e.message + '. Make sure the server is running.', 'ai');
            }
            
            document.getElementById('btn').disabled = false;
        }
        
        function addMessage(text, type) {
            var div = document.createElement('div');
            div.className = 'message ' + type + '-message';
            div.innerHTML = text.replace(/\n/g, '<br>');
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }
        
        function showTyping() {
            var div = document.createElement('div');
            div.className = 'message ai-message';
            div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
            div.id = 'typing-' + Date.now();
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            return div.id;
        }
        
        function removeTyping(id) {
            var el = document.getElementById(id);
            if (el) el.remove();
        }
    </script>
</body>
</html>
